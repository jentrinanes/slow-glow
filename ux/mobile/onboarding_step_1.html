<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slow Glow - Initial Profile Creation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            sage: '#8DA290',
                            cream: '#FDFBF7',
                            terracotta: '#C68B77',
                            charcoal: '#2D2D2D',
                            lightGray: '#F5F5F5',
                            border: '#E5E7EB',
                            blue: '#3B82F6',
                        }
                    },
                    boxShadow: {
                        'card': '0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01)',
                        'input': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FDFBF7;
            color: #2D2D2D;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar {
            display: none;
        }
        /* Custom radio button styles for Fitzpatrick scale */
        .fitzpatrick-radio:checked + div {
            border-color: #8DA290;
            box-shadow: 0 0 0 2px rgba(141, 162, 144, 0.2);
        }
        .fitzpatrick-radio:checked + div .check-icon {
            opacity: 1;
        }
    </style>
</head>
<body class="m-0 p-0 min-h-screen bg-brand-cream flex justify-center">

    <!-- Mobile Wrapper -->
    <div id="mobile-wrapper" class="w-full max-w-[430px] min-h-screen bg-white relative flex flex-col shadow-2xl overflow-hidden">
        
        <!-- Header -->
        <header id="mobile-header" class="flex justify-between items-center px-5 py-6 bg-white sticky top-0 z-20">
            <div class="flex items-center gap-2 text-brand-charcoal font-semibold text-lg">
                <i class="fa-solid fa-leaf text-brand-sage"></i>
                <span>Slow Glow</span>
            </div>
            <button class="text-sm font-medium text-gray-500 hover:text-brand-charcoal transition-colors">
                Save & Exit
            </button>
        </header>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto px-5 pb-32">
            
            <!-- Progress Tracker -->
            <div id="progress-tracker" class="mb-8">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-medium text-brand-blue">Step 1 of 3</span>
                    <span class="text-xs font-medium text-gray-400">Basics</span>
                </div>
                <!-- Progress Bar -->
                <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
                    <div class="h-full bg-brand-blue rounded-full w-1/3 transition-all duration-500"></div>
                </div>
            </div>

            <!-- Page Title & Intro -->
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-brand-charcoal mb-3 tracking-tight leading-tight">Let's start with the basics.</h1>
                <p class="text-gray-600 text-[15px] leading-relaxed">We use this information to build a scientific baseline for your skin journey. No judgment, just data.</p>
            </div>

            <!-- Main Form -->
            <form id="basics-form" class="space-y-8">
                
                <!-- Personal Info Stack -->
                <div id="personal-info-section" class="space-y-5">
                    <div class="flex flex-col gap-2">
                        <label for="firstName" class="text-[15px] font-medium text-brand-charcoal">First Name</label>
                        <input type="text" id="firstName" placeholder="e.g. Jane" class="w-full px-4 py-3.5 rounded-[12px] border border-gray-200 focus:border-brand-blue focus:ring-1 focus:ring-brand-blue outline-none transition-all shadow-input text-brand-charcoal placeholder-gray-400 bg-[#FDFBF7]">
                    </div>
                    
                    <div class="flex flex-col gap-2">
                        <label for="age" class="text-[15px] font-medium text-brand-charcoal">Age</label>
                        <input type="number" id="age" placeholder="Years" class="w-full px-4 py-3.5 rounded-[12px] border border-gray-200 focus:border-brand-blue focus:ring-1 focus:ring-brand-blue outline-none transition-all shadow-input text-brand-charcoal placeholder-gray-400 bg-[#FDFBF7]">
                    </div>
                </div>

                <!-- Divider -->
                <div class="w-full h-[1px] bg-gray-100"></div>

                <!-- Primary Skin Type -->
                <div id="skin-type-section" class="space-y-4">
                    <label class="text-[15px] font-medium text-brand-charcoal block">Primary Skin Type</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="cursor-pointer relative">
                            <input type="radio" name="skinType" class="peer sr-only" value="dry">
                            <div class="px-4 py-4 rounded-[12px] border border-gray-200 text-center peer-checked:border-brand-blue peer-checked:bg-blue-50 transition-all bg-[#FDFBF7]">
                                <span class="text-[15px] font-medium text-gray-700 peer-checked:text-brand-blue">Dry</span>
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="skinType" class="peer sr-only" value="normal" checked>
                            <div class="px-4 py-4 rounded-[12px] border-2 border-brand-blue bg-blue-50 text-center transition-all shadow-[0_0_0_2px_rgba(59,130,246,0.1)]">
                                <span class="text-[15px] font-semibold text-brand-blue">Normal</span>
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="skinType" class="peer sr-only" value="combination">
                            <div class="px-4 py-4 rounded-[12px] border border-gray-200 text-center peer-checked:border-brand-blue peer-checked:bg-blue-50 transition-all bg-[#FDFBF7]">
                                <span class="text-[15px] font-medium text-gray-700 peer-checked:text-brand-blue">Combo</span>
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="skinType" class="peer sr-only" value="oily">
                            <div class="px-4 py-4 rounded-[12px] border border-gray-200 text-center peer-checked:border-brand-blue peer-checked:bg-blue-50 transition-all bg-[#FDFBF7]">
                                <span class="text-[15px] font-medium text-gray-700 peer-checked:text-brand-blue">Oily</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Divider -->
                <div class="w-full h-[1px] bg-gray-100"></div>

                <!-- Fitzpatrick Scale Selector -->
                <div id="fitzpatrick-section" class="space-y-4">
                    <div class="flex justify-between items-center">
                        <label class="text-[15px] font-medium text-brand-charcoal">Fitzpatrick Skin Type</label>
                        <button type="button" class="text-xs text-brand-sage hover:underline flex items-center gap-1 font-medium bg-brand-sage/10 px-2 py-1 rounded-full">
                            <i class="fa-solid fa-info-circle text-[10px]"></i> Info
                        </button>
                    </div>
                    
                    <!-- Horizontal Scrollable Row for Mobile -->
                    <div class="flex gap-3 overflow-x-auto pb-4 snap-x -mx-5 px-5 hide-scrollbar">
                        <!-- Type I -->
                        <label class="cursor-pointer relative group flex-shrink-0 w-[80px] snap-center">
                            <input type="radio" name="fitzpatrick" class="fitzpatrick-radio sr-only" value="1">
                            <div class="h-16 w-full rounded-[14px] border border-gray-200 bg-[#F9E5D9] transition-all flex items-center justify-center relative overflow-hidden">
                                <i class="fa-solid fa-check text-white text-base opacity-0 check-icon transition-opacity z-10 drop-shadow-md"></i>
                            </div>
                            <span class="block text-center text-xs mt-2 text-gray-500 font-medium">Type I</span>
                        </label>
                        <!-- Type II -->
                        <label class="cursor-pointer relative group flex-shrink-0 w-[80px] snap-center">
                            <input type="radio" name="fitzpatrick" class="fitzpatrick-radio sr-only" value="2">
                            <div class="h-16 w-full rounded-[14px] border border-gray-200 bg-[#F0D5C2] transition-all flex items-center justify-center relative overflow-hidden">
                                <i class="fa-solid fa-check text-white text-base opacity-0 check-icon transition-opacity z-10 drop-shadow-md"></i>
                            </div>
                            <span class="block text-center text-xs mt-2 text-gray-500 font-medium">Type II</span>
                        </label>
                        <!-- Type III -->
                        <label class="cursor-pointer relative group flex-shrink-0 w-[80px] snap-center">
                            <input type="radio" name="fitzpatrick" class="fitzpatrick-radio sr-only" value="3" checked>
                            <div class="h-16 w-full rounded-[14px] border-2 border-brand-sage bg-[#D9B49C] transition-all flex items-center justify-center relative overflow-hidden shadow-[0_0_0_4px_rgba(141,162,144,0.15)]">
                                <i class="fa-solid fa-check text-white text-base opacity-1 check-icon transition-opacity z-10 drop-shadow-md"></i>
                            </div>
                            <span class="block text-center text-xs mt-2 text-brand-charcoal font-bold">Type III</span>
                        </label>
                        <!-- Type IV -->
                        <label class="cursor-pointer relative group flex-shrink-0 w-[80px] snap-center">
                            <input type="radio" name="fitzpatrick" class="fitzpatrick-radio sr-only" value="4">
                            <div class="h-16 w-full rounded-[14px] border border-gray-200 bg-[#B58B6F] transition-all flex items-center justify-center relative overflow-hidden">
                                <i class="fa-solid fa-check text-white text-base opacity-0 check-icon transition-opacity z-10 drop-shadow-md"></i>
                            </div>
                            <span class="block text-center text-xs mt-2 text-gray-500 font-medium">Type IV</span>
                        </label>
                        <!-- Type V -->
                        <label class="cursor-pointer relative group flex-shrink-0 w-[80px] snap-center">
                            <input type="radio" name="fitzpatrick" class="fitzpatrick-radio sr-only" value="5">
                            <div class="h-16 w-full rounded-[14px] border border-gray-200 bg-[#7B5238] transition-all flex items-center justify-center relative overflow-hidden">
                                <i class="fa-solid fa-check text-white text-base opacity-0 check-icon transition-opacity z-10 drop-shadow-md"></i>
                            </div>
                            <span class="block text-center text-xs mt-2 text-gray-500 font-medium">Type V</span>
                        </label>
                        <!-- Type VI -->
                        <label class="cursor-pointer relative group flex-shrink-0 w-[80px] snap-center">
                            <input type="radio" name="fitzpatrick" class="fitzpatrick-radio sr-only" value="6">
                            <div class="h-16 w-full rounded-[14px] border border-gray-200 bg-[#4A3123] transition-all flex items-center justify-center relative overflow-hidden">
                                <i class="fa-solid fa-check text-white text-base opacity-0 check-icon transition-opacity z-10 drop-shadow-md"></i>
                            </div>
                            <span class="block text-center text-xs mt-2 text-gray-500 font-medium">Type VI</span>
                        </label>
                    </div>
                </div>
            </form>
        </div>

        <!-- Fixed Bottom Action Bar -->
        <div id="bottom-action-bar" class="absolute bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 p-5 pt-4 z-30 pb-safe">
            <button type="button" class="w-full py-4 bg-brand-blue hover:bg-blue-600 text-white text-[16px] font-semibold rounded-[14px] transition-colors shadow-[0_8px_20px_-6px_rgba(59,130,246,0.5)] flex items-center justify-center gap-2">
                Continue to Skin Concerns
                <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>
        </div>

    </div>

    <style>
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body>
</html>
