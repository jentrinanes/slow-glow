<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slow Glow - Initial Profile Creation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            sage: '#8DA290',
                            cream: '#FDFBF7',
                            terracotta: '#C68B77',
                            charcoal: '#2D2D2D',
                            lightGray: '#F5F5F5',
                            border: '#E5E7EB',
                            blue: '#3B82F6',
                        }
                    },
                    boxShadow: {
                        'card': '0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01)',
                        'input': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FDFBF7;
            color: #2D2D2D;
            font-family: 'Inter', sans-serif;
        }
        ::-webkit-scrollbar {
            display: none;
        }
        /* Custom radio button styles for Fitzpatrick scale */
        .fitzpatrick-radio:checked + div {
            border-color: #8DA290;
            box-shadow: 0 0 0 2px rgba(141, 162, 144, 0.2);
        }
        .fitzpatrick-radio:checked + div .check-icon {
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <!-- Main Container -->
    <main id="main-container" class="w-full max-w-[1200px] bg-white rounded-[24px] shadow-card overflow-hidden flex flex-col md:flex-row h-auto md:h-[800px]">
        
        <!-- Left Illustration Section (Reference Image Style) -->
        <div id="illustration-section" class="hidden md:block w-full md:w-[45%] bg-brand-blue relative overflow-hidden">
            <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/f946bc13d0-370839592ab6bb37045b.png" alt="abstract science-based skincare illustration, clean lines, blue background, notebook style doodles, wellness theme" />
        </div>

        <!-- Right Form Section -->
        <div id="form-section" class="w-full md:w-[55%] flex flex-col p-8 lg:p-12 h-full overflow-y-auto relative">
            
            <!-- Header / Save & Exit -->
            <header id="onboarding-header" class="flex justify-between items-center mb-10 w-full">
                <div class="flex items-center gap-2 text-brand-charcoal font-semibold text-lg">
                    <i class="fa-solid fa-leaf text-brand-sage"></i>
                    <span>Slow Glow</span>
                </div>
                <button class="text-sm font-medium text-gray-500 hover:text-brand-charcoal transition-colors">
                    Save & Exit
                </button>
            </header>

            <!-- Progress Stepper -->
            <div id="progress-stepper" class="flex items-center gap-4 mb-12 border-b border-brand-border pb-6">
                <!-- Step 1 (Active) -->
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-md bg-brand-blue text-white flex items-center justify-center font-semibold text-sm">
                        1
                    </div>
                    <span class="text-sm font-medium text-brand-charcoal">Basics</span>
                </div>
                
                <!-- Divider -->
                <div class="w-8 h-[1px] bg-gray-200"></div>
                
                <!-- Step 2 -->
                <div class="flex items-center gap-2 opacity-50">
                    <div class="w-8 h-8 rounded-md bg-gray-100 text-gray-500 flex items-center justify-center font-semibold text-sm">
                        2
                    </div>
                    <span class="text-sm font-medium text-gray-500">Skin Concerns</span>
                </div>

                <!-- Divider -->
                <div class="w-8 h-[1px] bg-gray-200 hidden sm:block"></div>
                
                <!-- Step 3 -->
                <div class="hidden sm:flex items-center gap-2 opacity-50">
                    <div class="w-8 h-8 rounded-md bg-gray-100 text-gray-500 flex items-center justify-center font-semibold text-sm">
                        3
                    </div>
                    <span class="text-sm font-medium text-gray-500">Current Routine</span>
                </div>
            </div>

            <!-- Form Content -->
            <div id="basics-form-container" class="flex-1 flex flex-col">
                <div class="mb-8">
                    <p class="text-sm text-gray-500 font-medium mb-2">Step 1/3</p>
                    <h1 class="text-3xl font-bold text-brand-charcoal mb-3 tracking-tight">Let's start with the basics.</h1>
                    <p class="text-gray-600 text-sm leading-relaxed max-w-md">We use this information to build a scientific baseline for your skin journey. No judgment, just data.</p>
                </div>

                <form class="space-y-6 flex-1">
                    <!-- Row 1: Name & Age -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col gap-2">
                            <label for="firstName" class="text-sm font-medium text-brand-charcoal">First Name</label>
                            <input type="text" id="firstName" placeholder="e.g. Jane" class="w-full px-4 py-3 rounded-[8px] border border-gray-300 focus:border-brand-blue focus:ring-1 focus:ring-brand-blue outline-none transition-all shadow-input text-brand-charcoal placeholder-gray-400">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label for="age" class="text-sm font-medium text-brand-charcoal">Age</label>
                            <input type="number" id="age" placeholder="Years" class="w-full px-4 py-3 rounded-[8px] border border-gray-300 focus:border-brand-blue focus:ring-1 focus:ring-brand-blue outline-none transition-all shadow-input text-brand-charcoal placeholder-gray-400">
                        </div>
                    </div>

                    <!-- Skin Type Selection -->
                    <div class="flex flex-col gap-3 pt-4 border-t border-brand-border/50">
                        <label class="text-sm font-medium text-brand-charcoal">Primary Skin Type</label>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                            <label class="cursor-pointer relative">
                                <input type="radio" name="skinType" class="peer sr-only" value="dry">
                                <div class="px-4 py-3 rounded-[8px] border border-gray-200 text-center peer-checked:border-brand-blue peer-checked:bg-blue-50 transition-all">
                                    <span class="text-sm font-medium text-gray-700 peer-checked:text-brand-blue">Dry</span>
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="skinType" class="peer sr-only" value="normal" checked>
                                <div class="px-4 py-3 rounded-[8px] border border-brand-blue bg-blue-50 text-center transition-all">
                                    <span class="text-sm font-medium text-brand-blue">Normal</span>
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="skinType" class="peer sr-only" value="combination">
                                <div class="px-4 py-3 rounded-[8px] border border-gray-200 text-center peer-checked:border-brand-blue peer-checked:bg-blue-50 transition-all">
                                    <span class="text-sm font-medium text-gray-700 peer-checked:text-brand-blue">Combo</span>
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="skinType" class="peer sr-only" value="oily">
                                <div class="px-4 py-3 rounded-[8px] border border-gray-200 text-center peer-checked:border-brand-blue peer-checked:bg-blue-50 transition-all">
                                    <span class="text-sm font-medium text-gray-700 peer-checked:text-brand-blue">Oily</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Fitzpatrick Scale Selector -->
                    <div id="fitzpatrick-selector" class="flex flex-col gap-3 pt-4 border-t border-brand-border/50">
                        <div class="flex justify-between items-center">
                            <label class="text-sm font-medium text-brand-charcoal">Fitzpatrick Skin Type</label>
                            <button type="button" class="text-xs text-brand-sage hover:underline flex items-center gap-1">
                                <i class="fa-regular fa-circle-question"></i> What's this?
                            </button>
                        </div>
                        <div class="grid grid-cols-3 sm:grid-cols-6 gap-2">
                            <!-- Type I -->
                            <label class="cursor-pointer relative group">
                                <input type="radio" name="fitzpatrick" class="fitzpatrick-radio sr-only" value="1">
                                <div class="h-12 w-full rounded-[8px] border border-gray-200 bg-[#F9E5D9] transition-all flex items-center justify-center relative overflow-hidden">
                                    <i class="fa-solid fa-check text-white text-sm opacity-0 check-icon transition-opacity z-10 drop-shadow-md"></i>
                                </div>
                                <span class="block text-center text-xs mt-1 text-gray-500 font-medium">Type I</span>
                            </label>
                            <!-- Type II -->
                            <label class="cursor-pointer relative group">
                                <input type="radio" name="fitzpatrick" class="fitzpatrick-radio sr-only" value="2">
                                <div class="h-12 w-full rounded-[8px] border border-gray-200 bg-[#F0D5C2] transition-all flex items-center justify-center relative overflow-hidden">
                                    <i class="fa-solid fa-check text-white text-sm opacity-0 check-icon transition-opacity z-10 drop-shadow-md"></i>
                                </div>
                                <span class="block text-center text-xs mt-1 text-gray-500 font-medium">Type II</span>
                            </label>
                            <!-- Type III -->
                            <label class="cursor-pointer relative group">
                                <input type="radio" name="fitzpatrick" class="fitzpatrick-radio sr-only" value="3" checked>
                                <div class="h-12 w-full rounded-[8px] border-2 border-brand-sage bg-[#D9B49C] transition-all flex items-center justify-center relative overflow-hidden shadow-[0_0_0_2px_rgba(141,162,144,0.2)]">
                                    <i class="fa-solid fa-check text-white text-sm opacity-1 check-icon transition-opacity z-10 drop-shadow-md"></i>
                                </div>
                                <span class="block text-center text-xs mt-1 text-brand-charcoal font-semibold">Type III</span>
                            </label>
                            <!-- Type IV -->
                            <label class="cursor-pointer relative group">
                                <input type="radio" name="fitzpatrick" class="fitzpatrick-radio sr-only" value="4">
                                <div class="h-12 w-full rounded-[8px] border border-gray-200 bg-[#B58B6F] transition-all flex items-center justify-center relative overflow-hidden">
                                    <i class="fa-solid fa-check text-white text-sm opacity-0 check-icon transition-opacity z-10 drop-shadow-md"></i>
                                </div>
                                <span class="block text-center text-xs mt-1 text-gray-500 font-medium">Type IV</span>
                            </label>
                            <!-- Type V -->
                            <label class="cursor-pointer relative group">
                                <input type="radio" name="fitzpatrick" class="fitzpatrick-radio sr-only" value="5">
                                <div class="h-12 w-full rounded-[8px] border border-gray-200 bg-[#7B5238] transition-all flex items-center justify-center relative overflow-hidden">
                                    <i class="fa-solid fa-check text-white text-sm opacity-0 check-icon transition-opacity z-10 drop-shadow-md"></i>
                                </div>
                                <span class="block text-center text-xs mt-1 text-gray-500 font-medium">Type V</span>
                            </label>
                            <!-- Type VI -->
                            <label class="cursor-pointer relative group">
                                <input type="radio" name="fitzpatrick" class="fitzpatrick-radio sr-only" value="6">
                                <div class="h-12 w-full rounded-[8px] border border-gray-200 bg-[#4A3123] transition-all flex items-center justify-center relative overflow-hidden">
                                    <i class="fa-solid fa-check text-white text-sm opacity-0 check-icon transition-opacity z-10 drop-shadow-md"></i>
                                </div>
                                <span class="block text-center text-xs mt-1 text-gray-500 font-medium">Type VI</span>
                            </label>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Action Footer -->
            <div id="action-footer" class="mt-auto pt-8 border-t border-gray-100 flex items-center justify-between">
                <button type="button" class="px-6 py-3 text-sm font-medium text-brand-charcoal hover:bg-gray-50 rounded-[8px] transition-colors invisible">
                    Back
                </button>
                <button type="button" class="px-8 py-3 bg-brand-blue hover:bg-blue-600 text-white text-sm font-medium rounded-[8px] transition-colors shadow-sm flex items-center gap-2">
                    Next Step
                </button>
            </div>

        </div>
    </main>

</body>
</html>
